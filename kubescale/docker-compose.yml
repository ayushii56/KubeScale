version: "3.9"

services:
  api-gateway:
    build: ./services/api-gateway
    container_name: kubescale-api-gateway
    ports:
      - "8000:8000"
    env_file:
      - ./services/api-gateway/.env

  auth-service:
    build: ./services/auth-service
    container_name: kubescale-auth-service
    ports:
      - "8001:8001"